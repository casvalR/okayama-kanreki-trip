<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#C44E4E"/>
      <stop offset="60%" stop-color="#A83232"/>
      <stop offset="100%" stop-color="#7A1F1F"/>
    </radialGradient>
    <radialGradient id="goldText" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#F4E0A0"/>
      <stop offset="55%" stop-color="#E8C275"/>
      <stop offset="100%" stop-color="#C8A464"/>
    </radialGradient>
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
      <feOffset dx="0" dy="1"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadowDiff"/>
      <feFlood flood-color="#3A0808" flood-opacity="0.5"/>
      <feComposite in2="shadowDiff" operator="in"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="46" fill="url(#bg)"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="#5C1717" stroke-width="0.5" opacity="0.6"/>
  <circle cx="50" cy="50" r="44" fill="none" stroke="#E8C275" stroke-width="0.6" opacity="0.45"/>
  <text x="50" y="70"
        font-family="'Shippori Mincho','Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif"
        font-size="62"
        font-weight="700"
        fill="url(#goldText)"
        text-anchor="middle"
        filter="url(#goldGlow)">寿</text>
</svg>
